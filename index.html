<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit a Safety Idea · Fremantle Bridges Alliance</title>
<style>
  :root{
    --bg:#f2f2f0;
    --surface:#ffffff;
    --soft:#f4f5f6;
    --ink:#2e3234;
    --muted:#878d92;
    --label:#3c4043;
    --line:#e2e4e6;
    --input-line:#cfd4d7;
    --teal:#00a3ad;
    --teal-dark:#00858d;
    --teal-soft:#e0f4f5;
    --red:#e63c2f;
    --red-dark:#c92e22;
    --red-soft:#fdecea;
    --green:#3f9d46;
    --green-soft:#e9f5ea;
    --amber:#b26a00;
    --amber-soft:#fdf3e3;
    --info-bg:#e9f2fb;
    --info-ink:#2e6da4;
    --radius:10px;
    --shadow:0 1px 3px rgba(40,45,50,.08),0 4px 14px rgba(40,45,50,.05);
    --font:"Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.5;min-height:100vh}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:.92rem;color:var(--ink)}
  a{color:var(--teal-dark)}

  .wrap{max-width:900px;margin:0 auto;padding:1.25rem 1.25rem 3.5rem}

  /* ---------- Page header ---------- */
  .crumb{font-size:.75rem;color:var(--muted);margin-bottom:.35rem}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
  .page-head h1{font-size:1.5rem;font-weight:700;letter-spacing:-.01em}
  .page-head .alliance{font-size:.85rem;color:var(--muted)}
  .head-side{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem}
  .saved{font-size:.8rem;color:var(--green);font-weight:600;visibility:hidden}
  .saved.show{visibility:visible}
  .role-chip{display:inline-flex;align-items:center;gap:.4rem;background:var(--teal-soft);color:var(--teal-dark);font-size:.78rem;font-weight:700;border-radius:999px;padding:.25rem .8rem}
  .role-chip::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--teal)}

  /* ---------- Workflow tracker ---------- */
  .tracker{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem 1.25rem 1.15rem;margin-bottom:1.1rem}
  .tracker-top{display:flex;justify-content:space-between;align-items:baseline;gap:1rem;font-size:.8rem;margin-bottom:.5rem}
  .tracker-top .stage-label{font-weight:700;color:var(--label)}
  .tracker-top .pct{color:var(--muted)}
  .tracker-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:1.1rem}
  .tracker-bar span{display:block;height:100%;background:var(--teal);border-radius:2px;transition:width .3s}
  .steps{display:flex}
  .step{flex:1;min-width:0;position:relative;text-align:center;background:none;border:none;padding:0 .25rem;color:inherit}
  .step::before{content:"";position:absolute;top:15px;left:calc(-50% + 16px);width:calc(100% - 32px);height:3px;background:var(--line);border-radius:2px}
  .step:first-child::before{display:none}
  .step.s-done::before,.step.s-dead::before{background:var(--teal)}
  .step .dot{position:relative;z-index:1;width:32px;height:32px;border-radius:50%;background:#fff;border:2px solid var(--input-line);color:var(--muted);font-weight:700;font-size:.82rem;display:inline-flex;align-items:center;justify-content:center;transition:transform .12s}
  .step .name{display:block;font-size:.76rem;font-weight:700;color:var(--muted);margin-top:.35rem;line-height:1.25}
  .step .role{display:block;font-size:.68rem;color:var(--muted);font-weight:500}
  .step.s-done .dot{background:var(--teal);border-color:var(--teal);color:#fff}
  .step.s-done .name{color:var(--teal-dark)}
  .step.s-now .dot{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 0 0 4px var(--teal-soft)}
  .step.s-now .name{color:var(--ink)}
  .step.s-dead .dot{background:var(--red);border-color:var(--red);color:#fff}
  .step.s-dead .name{color:var(--red)}
  .step:hover .dot{transform:scale(1.1)}
  .step.viewing .name{text-decoration:underline;text-underline-offset:3px}
  .tracker-hint{text-align:center;font-size:.7rem;color:var(--muted);margin-top:.8rem}

  /* ---------- Cards ---------- */
  .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.4rem 1.5rem}
  .card + .card{margin-top:1rem}
  .card h2{font-size:1.02rem;margin-bottom:.2rem}
  .card .sub{color:var(--muted);font-size:.84rem;margin-bottom:1rem}

  .info-banner{display:flex;gap:.6rem;align-items:flex-start;background:var(--info-bg);color:var(--info-ink);border-radius:8px;padding:.7rem .9rem;font-size:.84rem;margin-bottom:1.2rem}
  .info-banner .i{flex:none;width:18px;height:18px;border-radius:50%;background:var(--info-ink);color:#fff;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;font-style:normal;margin-top:.1rem}

  .callout{border-radius:8px;padding:.85rem 1rem;font-size:.88rem}
  .callout.red{background:var(--red-soft);color:var(--red-dark)}
  .callout.green{background:var(--green-soft);color:var(--green)}
  .callout.amber{background:var(--amber-soft);color:var(--amber)}
  .callout.teal{background:var(--teal-soft);color:var(--teal-dark)}

  /* ---------- Forms ---------- */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.05rem 1.5rem}
  .form-grid > *{min-width:0}
  .form-grid .full{grid-column:1/-1}
  @media(max-width:680px){.form-grid{grid-template-columns:1fr}}
  .field label{display:block;font-size:.78rem;font-weight:700;color:var(--label);margin-bottom:.35rem}
  .field label .req{color:var(--red)}
  .field label .hint{color:var(--muted);font-weight:500}
  .field input[type=text],.field input[type=url],.field input[type=date],.field select,.field textarea{
    width:100%;border:1px solid var(--input-line);border-radius:6px;padding:.6rem .7rem;background:#fff;transition:border-color .15s,box-shadow .15s}
  .field textarea{min-height:96px;resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
  .field .auto{background:var(--soft)!important;color:#5f6368}
  .field .help{font-size:.73rem;color:var(--muted);margin-top:.3rem}
  .field.invalid input,.field.invalid select,.field.invalid textarea{border-color:var(--red)}
  .field .err{display:none;font-size:.74rem;color:var(--red);font-weight:600;margin-top:.3rem}
  .field.invalid .err{display:block}
  .checks{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.4rem .8rem;border:1px solid var(--input-line);border-radius:6px;padding:.7rem .8rem}
  .checks label{display:flex;align-items:center;gap:.5rem;font-size:.86rem;font-weight:500;margin:0;cursor:pointer;color:var(--ink)}
  .checks input{accent-color:var(--teal);width:15px;height:15px}

  /* ---------- Multiselect dropdown ---------- */
  .msel{position:relative}
  .msel-toggle{display:flex;align-items:center;justify-content:space-between;gap:.5rem;width:100%;border:1px solid var(--input-line);border-radius:6px;padding:.6rem .7rem;background:#fff;text-align:left;color:var(--ink);font-size:.92rem;transition:border-color .15s,box-shadow .15s}
  .msel-toggle:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
  .msel-summary{flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .msel-summary.ph{color:var(--muted)}
  .msel-caret{flex:none;color:var(--muted);font-size:.65rem;transition:transform .15s}
  .msel.open .msel-caret{transform:rotate(180deg)}
  .msel.open .msel-toggle{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
  .msel-panel{position:absolute;z-index:20;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--input-line);border-radius:6px;box-shadow:var(--shadow);padding:.35rem;max-height:250px;overflow-y:auto;gap:.1rem}
  .msel-panel[hidden]{display:none}
  .msel-panel:not([hidden]){display:grid}
  .msel-panel label{display:flex;align-items:center;gap:.55rem;font-size:.86rem;font-weight:500;margin:0;padding:.4rem .5rem;border-radius:5px;cursor:pointer;color:var(--ink)}
  .msel-panel label:hover{background:var(--soft)}
  .msel-panel input{accent-color:var(--teal);width:15px;height:15px}
  .field.invalid .msel-toggle{border-color:var(--red)}
  .form-actions{display:flex;justify-content:space-between;align-items:center;gap:.75rem;margin-top:1.5rem;padding-top:1.2rem;border-top:1px solid var(--line);flex-wrap:wrap}
  .form-actions .right{display:flex;gap:.75rem;margin-left:auto}

  /* ---------- Buttons ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;border-radius:6px;border:1.5px solid transparent;font-weight:700;font-size:.9rem;padding:.6rem 1.3rem;transition:background .15s,color .15s}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-red{background:var(--red);color:#fff}
  .btn-red:hover{background:var(--red-dark)}
  .btn-red-outline{background:#fff;border-color:var(--red);color:var(--red)}
  .btn-red-outline:hover{background:var(--red-soft)}
  .btn-teal{background:var(--teal);color:#fff}
  .btn-teal:hover{background:var(--teal-dark)}
  .btn-teal-outline{background:#fff;border-color:var(--teal);color:var(--teal-dark)}
  .btn-teal-outline:hover{background:var(--teal-soft)}
  .btn-ghost{background:#fff;border-color:var(--input-line);color:var(--label)}
  .btn-ghost:hover{background:var(--soft)}
  .btn-sm{padding:.4rem .85rem;font-size:.8rem}

  /* ---------- Summary / recap ---------- */
  .kv{display:grid;grid-template-columns:auto 1fr;gap:.4rem 1.4rem;font-size:.88rem}
  .kv dt{color:var(--muted);font-weight:600;white-space:nowrap}
  .kv dd{min-width:0;overflow-wrap:anywhere}
  .tags{display:flex;flex-wrap:wrap;gap:.35rem}
  .tag{background:var(--soft);border:1px solid var(--line);border-radius:5px;font-size:.75rem;font-weight:600;padding:.1rem .5rem;color:var(--label)}
  .summary-block{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:.8rem 1rem;font-size:.9rem;white-space:pre-wrap;margin-bottom:1rem}
  .iid{font-size:.8rem;font-weight:700;color:var(--teal-dark);letter-spacing:.05em}

  /* ---------- Decisions ---------- */
  .decisions{display:flex;flex-direction:column;gap:.9rem;margin-top:.4rem}
  .decision{display:flex;gap:1rem;align-items:flex-start;border:1px solid var(--line);border-radius:8px;padding:.9rem 1rem}
  .decision .btn{flex:none;min-width:170px}
  .decision p{font-size:.8rem;color:var(--muted)}
  .reveal{border:1px solid var(--line);border-radius:8px;background:var(--soft);padding:1rem}
  .reveal h3{font-size:.88rem;margin-bottom:.6rem}
  .decision-form{display:flex;flex-direction:column;gap:1.05rem;margin-top:.4rem}
  .decision-form .fb-req{color:var(--red);display:none}
  .decision-form.need-fb .fb-req{display:inline}
  .decision-form .fb-optional{color:var(--muted);font-weight:500}
  .decision-form.need-fb .fb-optional{display:none}

  /* ---------- Comments ---------- */
  .clog{list-style:none;display:flex;flex-direction:column;gap:.7rem;max-height:300px;overflow-y:auto}
  .clog li{border-left:3px solid var(--line);padding:.1rem 0 .1rem .8rem}
  .clog li.sys{border-left-color:var(--teal)}
  .clog .who{font-size:.78rem;font-weight:700}
  .clog .who .r{color:var(--muted);font-weight:500}
  .clog .txt{font-size:.86rem;margin-top:.05rem;white-space:pre-wrap}
  .comment-box{display:flex;gap:.5rem;margin-top:.9rem}
  .comment-box textarea{flex:1;min-height:44px;border:1px solid var(--input-line);border-radius:6px;padding:.5rem .65rem}

  /* ---------- Confirmation / terminal ---------- */
  .hero{text-align:center;padding:2.25rem 1.5rem 2rem}
  .hero .mark{width:62px;height:62px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem}
  .hero .mark.ok{background:var(--green-soft);color:var(--green)}
  .hero .mark.bad{background:var(--red-soft);color:var(--red)}
  .hero h2{font-size:1.35rem;margin-bottom:.3rem}
  .hero p{color:var(--muted);max-width:56ch;margin:.5rem auto 0;font-size:.92rem}
  .flow{list-style:none;max-width:540px;margin:1.4rem auto 0;text-align:left}
  .flow li{display:flex;gap:.85rem;position:relative;padding-bottom:1rem}
  .flow li:last-child{padding-bottom:0}
  .flow li::before{content:"";position:absolute;left:13px;top:28px;bottom:2px;width:2px;background:var(--line)}
  .flow li:last-child::before{display:none}
  .flow .n{width:28px;height:28px;border-radius:50%;background:var(--teal-soft);color:var(--teal-dark);font-weight:700;font-size:.8rem;display:flex;align-items:center;justify-content:center;flex:none;position:relative;z-index:1}
  .flow .t{font-size:.88rem}
  .flow .t b{display:block}
  .flow .t span{color:var(--muted);font-size:.8rem}
  .hero-actions{margin-top:1.75rem;display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}

  /* ---------- Peek (recap / preview of a clicked step) ---------- */
  .peek-head{display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
  .peek-head .t{font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .peek-head .t.done{color:var(--green)}
  .peek-head .t.next{color:var(--teal-dark)}
  .peek-head .t.dead{color:var(--red)}
  .outcomes{list-style:none;display:flex;flex-direction:column;gap:.5rem;margin-top:.9rem}
  .outcomes li{display:flex;gap:.6rem;align-items:flex-start;font-size:.86rem}
  .outcomes .b{flex:none;width:8px;height:8px;border-radius:50%;background:var(--teal);margin-top:.45rem}

  #toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:.65rem 1.2rem;border-radius:8px;font-size:.88rem;font-weight:600;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .foot{margin-top:2rem;text-align:center;font-size:.73rem;color:var(--muted)}
  .foot button{background:none;border:none;color:var(--muted);font-size:.73rem;text-decoration:underline;text-underline-offset:2px}
  .foot button:hover{color:var(--red)}
</style>
</head>
<body>

<div class="wrap">
  <div class="crumb">Home › Idea Workflow</div>
  <div class="page-head">
    <div>
      <h1 id="pageTitle">Submit a Safety Idea</h1>
      <div class="alliance">Fremantle Bridges Alliance · FBA</div>
    </div>
    <div class="head-side">
      <span class="role-chip" id="roleChip">Acting as: Delivery Team</span>
      <span class="saved" id="savedTag">✓ Draft auto-saved</span>
    </div>
  </div>

  <div class="tracker" id="tracker"></div>
  <div id="stage"></div>

  <div class="foot">
    All data is stored locally in this browser · <button id="resetBtn" type="button">Reset workflow</button>
  </div>
</div>
<div id="toast" role="status"></div>

<script>
"use strict";

/* =============================================================
   Reference data
============================================================= */
const PROFILE = { name: "Jake Anderson", project: "Fremantle Bridges Alliance" };

const PHASES = ["Design", "Procurement", "Construction", "Commissioning", "Handover"];

const DISCIPLINES = ["Civils", "Structural", "Building", "Other"];

const BENEFIT_CATEGORIES = [
  "Fatality & Serious Injury Prevention",
  "Occupational Health & Wellbeing",
  "Environmental Protection",
  "Process Safety",
  "Quality & Assurance",
  "Efficiency & Cost Reduction",
];

const FSR_CATEGORIES = [
  "Plant & Equipment", "Cranes & Lifting", "Excavation", "Piling",
  "Work in Rail Environments", "Heavy Vehicles", "Traffic Management",
  "Hazardous Energy", "Electrical Safety", "Hazardous Dust & Fibres",
  "Confined Spaces", "Falls & Dropped Objects", "Scaffolding",
  "Formwork & Falsework", "Work in, over & Adjacent to Water",
  "Precast Concrete", "Demolition",
];

const PC1_INCIDENTS = [
  { id: "EVT-2026-0041", label: "EVT-2026-0041 · Dropped scaffold tube, North Pylon" },
  { id: "EVT-2026-0087", label: "EVT-2026-0087 · Excavator near-miss with live cable" },
  { id: "EVT-2026-0102", label: "EVT-2026-0102 · Uncontrolled load swing during girder lift" },
  { id: "EVT-2026-0139", label: "EVT-2026-0139 · Stored energy release, hydraulic line" },
  { id: "EVT-2026-0155", label: "EVT-2026-0155 · Worker in exclusion zone during reversing" },
];

/* Statuses (one idea moves through these) */
const S = {
  DRAFT: "draft",           // Delivery Team filling the form
  CONFIRM: "confirm",       // submission confirmation screen
  ESL: "review-esl",        // ESL Lead review
  PL: "review-pl",          // Project Leader decision (escalated)
  PLAN: "plan",             // Delivery Team creates Action Plan
  EXECUTION: "execution",   // Action Plan in progress
  POST: "post-impl",        // Post-Implementation Form
  COMPLETE: "complete",
  FEEDBACK: "feedback",     // non-viable, Delivery Team receives feedback
  CLOSED: "closed",         // feedback acknowledged
};

const ROLE_FOR_STATUS = {
  [S.DRAFT]: "Delivery Team", [S.CONFIRM]: "Delivery Team",
  [S.ESL]: "ESL Lead", [S.PL]: "Project Leader",
  [S.PLAN]: "Delivery Team", [S.EXECUTION]: "Delivery Team",
  [S.POST]: "Delivery Team", [S.COMPLETE]: "Delivery Team",
  [S.FEEDBACK]: "Delivery Team", [S.CLOSED]: "Delivery Team",
};

const TITLE_FOR_STATUS = {
  [S.DRAFT]: "Submit a Safety Idea", [S.CONFIRM]: "Idea Submitted",
  [S.ESL]: "ESL Lead Review", [S.PL]: "Project Leader Decision",
  [S.PLAN]: "Create Action Plan", [S.EXECUTION]: "Action Plan in Progress",
  [S.POST]: "Post-Implementation Form", [S.COMPLETE]: "Initiative Complete",
  [S.FEEDBACK]: "Reviewer Feedback", [S.CLOSED]: "Initiative Closed",
};

/* =============================================================
   State & persistence
============================================================= */
const KEY = "es-flow-v2";
let idea = null;
let peek = null; // key of a tracker step being viewed (recap/preview), or null

function freshIdea() {
  return {
    status: S.DRAFT,
    id: null,
    escalated: false,
    returnStage: null,     // "esl" | "pl" while a returned idea is being revised & resubmitted
    draft: {
      project: PROFILE.project, submitter: PROFILE.name,
      date: new Date().toISOString().slice(0, 10),
      siteLocation: "", phase: "", ideaType: "new", discipline: "", title: "", summary: "",
      benefit: [], fsr: [], incident: "",
    },
    submission: null,      // frozen copy on submit
    decisions: {},         // esl: {outcome, feedback?, at}, pl: {...}
    actionPlan: null,
    postImpl: null,
    log: [],
  };
}

function save() { try { localStorage.setItem(KEY, JSON.stringify(idea)); } catch (e) {} }
function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) { const d = JSON.parse(raw); if (d && d.status) return d; }
  } catch (e) {}
  return null;
}

function nextInitiativeId() {
  let n = 1;
  try { n = parseInt(localStorage.getItem(KEY + "-seq") || "1", 10); localStorage.setItem(KEY + "-seq", String(n + 1)); } catch (e) {}
  return "ESI-2026-" + String(n).padStart(3, "0");
}

const nowISO = () => new Date().toISOString();
function fmtDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });
}
function fmtDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { day: "numeric", month: "short" }) + ", " +
         d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function addLog(type, text, who, role) {
  idea.log.push({ at: nowISO(), who: who || actorName(), role: role || currentRole(), type, text });
}
/* Role currently acting — while an ESL-returned idea is revised by the ESL Lead
   (returnStage === "pl"), the submit/confirm screens are driven by the ESL Lead. */
function currentRole() {
  if ((idea.status === S.DRAFT || idea.status === S.CONFIRM) && idea.returnStage === "pl") return "ESL Lead";
  return ROLE_FOR_STATUS[idea.status];
}
function actorName() {
  const r = currentRole();
  return r === "Delivery Team" ? (idea.submission ? idea.submission.submitter : PROFILE.name) : r;
}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 2600);
}

/* =============================================================
   Workflow path model — drives the clickable tracker
============================================================= */
function buildPath() {
  const nonViable = [S.FEEDBACK, S.CLOSED].includes(idea.status);
  const nodes = [
    { key: "submit", name: "Submit Idea", role: "Delivery Team" },
    { key: "esl", name: "ESL Review", role: "ESL Lead" },
  ];
  if (idea.escalated) nodes.push({ key: "pl", name: "Project Leader Decision", role: "Project Leader" });
  if (nonViable) {
    nodes.push({ key: "feedback", name: "Receive Feedback", role: "Delivery Team" });
  } else {
    nodes.push(
      { key: "plan", name: "Action Plan", role: "Delivery Team" },
      { key: "postimpl", name: "Post-Implementation", role: "Delivery Team" },
      { key: "done", name: "Complete", role: "Delivery Team" },
    );
  }
  return nodes;
}

function currentKey() {
  switch (idea.status) {
    case S.DRAFT: case S.CONFIRM: return idea.returnStage === "pl" ? "esl" : "submit";
    case S.ESL: return "esl";
    case S.PL: return "pl";
    case S.PLAN: case S.EXECUTION: return "plan";
    case S.POST: return "postimpl";
    case S.COMPLETE: return "done";
    case S.FEEDBACK: case S.CLOSED: return "feedback";
  }
}

/* State of each node: done | now | dead | next */
function nodeStates(nodes) {
  const cur = nodes.findIndex(n => n.key === currentKey());
  const terminal = [S.COMPLETE, S.CLOSED].includes(idea.status);
  return nodes.map((n, i) => {
    if (n.key === "esl" && idea.decisions.esl?.outcome === "non-viable") return "dead";
    if (n.key === "pl" && idea.decisions.pl?.outcome === "non-viable") return "dead";
    if (i < cur) return "done";
    if (i === cur) return terminal ? "done" : "now";
    return "next";
  });
}

/* =============================================================
   Rendering
============================================================= */
const $tracker = document.getElementById("tracker");
const $stage = document.getElementById("stage");
const $title = document.getElementById("pageTitle");
const $roleChip = document.getElementById("roleChip");
const $saved = document.getElementById("savedTag");

function render() {
  const nodes = buildPath();
  const states = nodeStates(nodes);
  const cur = nodes.findIndex(n => n.key === currentKey());
  const terminal = [S.COMPLETE, S.CLOSED].includes(idea.status);
  const doneCount = states.filter(s => s === "done" || s === "dead").length;
  const pct = terminal ? 100 : Math.round((doneCount / nodes.length) * 100);

  $title.textContent = (idea.returnStage && idea.status === S.DRAFT) ? "Revise & Resubmit Idea" : TITLE_FOR_STATUS[idea.status];
  $roleChip.textContent = "Acting as: " + currentRole();
  $saved.classList.toggle("show", false);

  $tracker.innerHTML = `
    <div class="tracker-top">
      <span class="stage-label">Stage ${Math.min(cur + 1, nodes.length)} of ${nodes.length} — ${esc(nodes[cur].name)} (${esc(nodes[cur].role)})</span>
      <span class="pct">${pct}% complete</span>
    </div>
    <div class="tracker-bar"><span style="width:${pct}%"></span></div>
    <div class="steps">
      ${nodes.map((n, i) => `
        <button class="step s-${states[i]} ${peek === n.key ? "viewing" : ""}" data-step="${n.key}"
                title="${states[i] === "next" ? "See what happens at this step" : states[i] === "now" ? "Current step" : "Review this step"}">
          <span class="dot">${states[i] === "done" ? "✓" : states[i] === "dead" ? "✕" : i + 1}</span>
          <span class="name">${esc(n.name)}</span>
          <span class="role">${esc(n.role)}</span>
        </button>`).join("")}
    </div>
    <div class="tracker-hint">Click any step to review it or preview what happens next.</div>`;

  $tracker.querySelectorAll("[data-step]").forEach(b => b.onclick = () => {
    const k = b.dataset.step;
    peek = (k === currentKey() || k === peek) ? null : k;
    render();
  });

  if (peek && peek !== currentKey()) {
    const i = nodes.findIndex(n => n.key === peek);
    $stage.innerHTML = states[i] === "next" ? viewPreview(nodes[i]) : viewRecap(nodes[i], states[i]);
  } else {
    peek = null;
    $stage.innerHTML = viewStage();
  }
  bindStage();
}

}

/* Custom multiselect dropdown — a toggle showing the current selection that
   opens a checkbox panel. `id` is used as the data-msel handle. */
function multiSelect(id, options, selected, placeholder) {
  const count = selected.length;
  const summary = count ? selected.join(", ") : placeholder;
  return `
  <div class="msel" data-msel="${id}">
    <button type="button" class="msel-toggle" aria-haspopup="listbox" aria-expanded="false">
      <span class="msel-summary ${count ? "" : "ph"}">${esc(summary)}</span>
      <span class="msel-caret">▾</span>
    </button>
    <div class="msel-panel" hidden>
      ${[...options].sort((a, b) => a.localeCompare(b)).map(o => `<label><input type="checkbox" value="${esc(o)}" ${selected.includes(o) ? "checked" : ""}> ${esc(o)}</label>`).join("")}

  </div>`;
}

              outcomes: ["Approve — the Delivery Team creates an Action Plan.", "Return for Detail — the ESL Lead revises and resubmits.", "Mark Non-Viable — written feedback goes back to the Delivery Team."] },
  plan:     { desc: "The Delivery Team creates the Action Plan. The Inspection ID and action summary are prefilled; due date, person responsible, and comments are set by the team.",
              outcomes: ["Action Plan is delivered, then marked complete to open the Post-Implementation Form."] },
  postimpl: { desc: "The Delivery Team reviews the original submission and closes out with implementation comments, contact person, case study link, and the value delivered.",
              outcomes: ["Initiative is complete and on record."] },
  done:     { desc: "The initiative is delivered, reviewed, and closed out.", outcomes: [] },
  feedback: { desc: "The Delivery Team receives the reviewer's feedback on the non-viable idea and acknowledges it to close the initiative.",
              outcomes: ["Initiative closes — the idea can be reworked and resubmitted."] },
};

function viewPreview(node) {
  const info = STEP_INFO[node.key];
  return `
  <div class="card">
    <div class="peek-head">
      <span class="t next">Up next</span>
      <button class="btn btn-ghost btn-sm" data-act="back">← Back to current step</button>
    </div>
    <h2>${esc(node.name)} <span class="sub" style="display:inline;font-weight:500">· ${esc(node.role)}</span></h2>
    <p class="sub" style="margin-top:.4rem">${esc(info.desc)}</p>
    ${info.outcomes.length ? `<ul class="outcomes">${info.outcomes.map(o => `<li><span class="b"></span>${esc(o)}</li>`).join("")}</ul>` : ""}
  </div>`;
}

function viewRecap(node, state) {
  let body = "";
  const s = idea.submission;
  if (node.key === "submit" && s) {
    body = `
      <div class="summary-block">${esc(s.summary)}</div>
      <div class="kv">
        <dt>Idea title</dt><dd>${esc(s.title)}</dd>
        <dt>Project</dt><dd>${esc(s.project)}</dd>
        <dt>Submitted by</dt><dd>${esc(s.submitter)} · ${fmtDate(s.submittedAt)}</dd>
        <dt>Site location</dt><dd>${esc(s.siteLocation)}</dd>
        <dt>Applicable phase</dt><dd>${esc(s.phase)}</dd>
        <dt>Discipline</dt><dd>${esc(s.discipline) || "—"}</dd>
        <dt>Benefit category</dt><dd><span class="tags">${(s.benefit || []).map(b => `<span class="tag">${esc(b)}</span>`).join("") || "—"}</span></dd>
        <dt>Related FSR</dt><dd><span class="tags">${s.fsr.map(f => `<span class="tag">${esc(f)}</span>`).join("")}</span></dd>
        <dt>Linked PC1 incident</dt><dd>${s.incident ? esc(pc1Label(s.incident)) : "None"}</dd>
      </div>`;
  } else if (node.key === "esl" || node.key === "pl") {
    const d = idea.decisions[node.key];
    const outcomeText = { approved: "Approved for execution.", escalated: "Escalated to the Project Leader.", "non-viable": "Marked non-viable.", returned: "Returned to the delivery team for more detail." }[d.outcome];
    body = `
      <div class="callout ${d.outcome === "non-viable" ? "red" : d.outcome === "returned" ? "amber" : "teal"}"><strong>Decision:</strong> ${outcomeText}${d.feedback ? `<br><strong>Feedback:</strong> ${esc(d.feedback)}` : ""}</div>
      <p class="sub" style="margin:.7rem 0 0">Decided ${fmtDateTime(d.at)}. Comments from this stage are in the activity log below.</p>`;
  } else if (node.key === "plan" && idea.actionPlan) {
    const ap = idea.actionPlan;
    body = `
      <div class="kv">
        <dt>Related Inspection ID</dt><dd>${esc(ap.inspectionId)}</dd>
        <dt>Action required</dt><dd>${esc(ap.actionSummary)}</dd>
        <dt>Due date</dt><dd>${fmtDate(ap.dueDate)}</dd>
        <dt>Person responsible</dt><dd>${esc(ap.personResponsible)}</dd>
        <dt>Comments</dt><dd>${esc(ap.comments || "—")}</dd>
        <dt>Completed</dt><dd>${ap.completedAt ? fmtDate(ap.completedAt) : "In progress"}</dd>
      </div>`;
  } else if (node.key === "postimpl" && idea.postImpl) {
    const p = idea.postImpl;
    body = `
      <div class="kv">
        <dt>Implementation comments</dt><dd>${esc(p.completionComments)}</dd>
        <dt>Contact person</dt><dd>${esc(p.sme)}</dd>
        <dt>Case study</dt><dd>${p.caseStudyLink ? `<a href="${esc(p.caseStudyLink)}" target="_blank" rel="noopener">${esc(p.caseStudyLink)}</a>` : "—"}</dd>
        <dt>Value</dt><dd>${esc(p.value) || "—"}</dd>
      </div>`;
  } else {
    body = `<p class="sub" style="margin:0">${esc(STEP_INFO[node.key].desc)}</p>`;
  }
  return `
  <div class="card">
    <div class="peek-head">
      <span class="t ${state === "dead" ? "dead" : "done"}">${state === "dead" ? "Decision made here" : "Completed step"}</span>
      <button class="btn btn-ghost btn-sm" data-act="back">← Back to current step</button>
    </div>
    <h2>${esc(node.name)} <span class="sub" style="display:inline;font-weight:500">· ${esc(node.role)}</span></h2>
    <div style="margin-top:.8rem">${body}</div>
  </div>
  ${commentsCard(true)}`;
}

/* =============================================================
   Events & transitions
============================================================= */
function markInvalid(input, bad) {
  const f = input.closest(".field");
  if (f) f.classList.toggle("invalid", bad);
  return bad;
}

function readDraftFromForm() {
  const g = id => document.getElementById(id);
  if (!g("f-title")) return;
  idea.draft = {
    project: idea.draft.project, submitter: idea.draft.submitter,
    date: idea.draft.date,
    siteLocation: g("f-site").value, phase: g("f-phase").value,
    ideaType: (document.querySelector('input[name="ideaType"]:checked') || {}).value || "new",
    discipline: g("f-discipline").value,
    title: g("f-title").value, summary: g("f-summary").value,
    benefit: [...document.querySelectorAll('[data-msel="f-benefit"] input:checked')].map(c => c.value),
    fsr: [...document.querySelectorAll('[data-msel="f-fsr"] input:checked')].map(c => c.value),
    incident: g("f-incident").value,
  };
}

let saveTimer = null;
function autoSaveDraft() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    readDraftFromForm();
    save();
    $saved.classList.add("show");
  }, 400);
}

function bindStage() {
  const form = document.getElementById("submitForm");
  if (form) {
    form.onsubmit = handleSubmitIdea;
    form.addEventListener("input", autoSaveDraft);
    form.addEventListener("change", autoSaveDraft);
    document.getElementById("saveDraftBtn").onclick = () => {
      readDraftFromForm(); save();
      $saved.classList.add("show");
      toast("Draft saved.");
    };
  }
  bindMultiSelects();
  bindDecisionForm();
  const planForm = document.getElementById("planForm");
  if (planForm) planForm.onsubmit = handleCreatePlan;
  const pifForm = document.getElementById("pifForm");
  if (pifForm) pifForm.onsubmit = handleSubmitPif;

  $stage.querySelectorAll("[data-act]").forEach(el => {
    el.onclick = (e) => { e.preventDefault(); handleAction(el.dataset.act); };
  });
}

/* Wire up every custom multiselect: toggle open/close, keep the summary in
   sync with the checkboxes, and close when clicking outside. */
function bindMultiSelects() {
  $stage.querySelectorAll(".msel").forEach(msel => {
    const toggle = msel.querySelector(".msel-toggle");
    const panel = msel.querySelector(".msel-panel");
    const summary = msel.querySelector(".msel-summary");
    const placeholder = summary.textContent;
    const refresh = () => {
      const picked = [...panel.querySelectorAll("input:checked")].map(c => c.value);
      summary.textContent = picked.length ? picked.join(", ") : placeholder;
      summary.classList.toggle("ph", picked.length === 0);
    };
    toggle.addEventListener("click", () => {
      const open = msel.classList.toggle("open");
      panel.hidden = !open;
      toggle.setAttribute("aria-expanded", String(open));
    });
    panel.addEventListener("change", refresh);
  });
  if (!bindMultiSelects._docBound) {
    document.addEventListener("click", e => {
      document.querySelectorAll(".msel.open").forEach(m => {
        if (!m.contains(e.target)) {
          m.classList.remove("open");
          m.querySelector(".msel-panel").hidden = true;
          m.querySelector(".msel-toggle").setAttribute("aria-expanded", "false");
        }
      });
    });
    bindMultiSelects._docBound = true;
  }
}

/* Decision form: show/hide the "required" marker on feedback as the outcome
   changes (optional only for Approve). */
function bindDecisionForm() {
  const df = document.getElementById("decisionForm");
  if (!df) return;
  const outcome = document.getElementById("decisionOutcome");
  const sync = () => df.classList.toggle("need-fb", !!outcome.value && outcome.value !== "approve");
  outcome.addEventListener("change", sync);
  sync();
}

function handleSubmitIdea(e) {
  e.preventDefault();
  readDraftFromForm();
  const g = id => document.getElementById(id);
  const d = idea.draft;
  let bad = false;
  bad = markInvalid(g("f-site"), !d.siteLocation.trim()) || bad;
  bad = markInvalid(g("f-phase"), !d.phase) || bad;
  bad = markInvalid(g("f-discipline"), !d.discipline) || bad;
  bad = markInvalid(g("f-title"), !d.title.trim()) || bad;
  bad = markInvalid(g("f-summary"), !d.summary.trim()) || bad;
  document.getElementById("field-benefit").classList.toggle("invalid", d.benefit.length === 0);
  document.getElementById("field-fsr").classList.toggle("invalid", d.fsr.length === 0);
  bad = bad || d.benefit.length === 0 || d.fsr.length === 0;
  if (bad) { toast("Please complete the required fields."); return; }

  const revising = !!idea.returnStage;
  if (!idea.id) idea.id = nextInitiativeId();
  idea.submission = Object.assign({}, d, {
    project: d.project.trim(), submitter: d.submitter.trim(),
    siteLocation: d.siteLocation.trim(), title: d.title.trim(), summary: d.summary.trim(),
    submittedAt: nowISO(),
  });
  idea.status = S.CONFIRM;
  addLog("sys", revising ? "Idea revised and resubmitted." : "Idea submitted.");
  save(); render();
}

function handleCreatePlan(e) {
  e.preventDefault();
  const due = document.getElementById("ap-due");
  const person = document.getElementById("ap-person");
  let bad = false;
  bad = markInvalid(due, !due.value) || bad;
  bad = markInvalid(person, !person.value.trim()) || bad;
  if (bad) { toast("Please complete the required fields."); return; }
  idea.actionPlan = {
    inspectionId: inspectionIdFor(),
    actionSummary: document.getElementById("ap-summary").value,
    dueDate: due.value,
    personResponsible: person.value.trim(),
    comments: document.getElementById("ap-comments").value.trim(),
    createdAt: nowISO(),
  };
  idea.status = S.EXECUTION;
  addLog("sys", `Action Plan created (${idea.actionPlan.inspectionId}).`);
  save(); render(); toast("Action Plan created.");
}

function handleSubmitPif(e) {
  e.preventDefault();
  const comments = document.getElementById("pif-comments");
  const sme = document.getElementById("pif-sme");
  const value = document.getElementById("pif-value");
  let bad = false;
  bad = markInvalid(comments, !comments.value.trim()) || bad;
  bad = markInvalid(sme, !sme.value.trim()) || bad;
  if (bad) { toast("Please complete the required fields."); return; }
  idea.postImpl = {
    completionComments: comments.value.trim(),
    sme: sme.value.trim(),
    caseStudyLink: document.getElementById("pif-link").value.trim(),
    value: value.value.trim(),
    submittedAt: nowISO(),
  };
  idea.status = S.COMPLETE;
  addLog("sys", "Post-Implementation Form submitted. Initiative complete.");
  save(); render(); toast("Initiative complete. 🎉");
}

/* Rebuild an editable draft from the frozen submission (used when an idea is
   returned for detail). */
function draftFromSubmission() {
  const s = idea.submission;
  return {
    project: s.project, submitter: s.submitter, date: s.date,
    siteLocation: s.siteLocation, phase: s.phase, discipline: s.discipline,
    title: s.title, summary: s.summary,
    benefit: [...(s.benefit || [])], fsr: [...(s.fsr || [])], incident: s.incident,
  };
}

/* Commit a reviewer decision. `stage` is "esl" or "pl". */
function submitDecision(stage, outcome, fb) {
  if (fb) addLog("comment", fb);
  switch (outcome) {
    case "approve":
      idea.decisions[stage] = { outcome: "approved", feedback: fb || undefined, at: nowISO() };
      addLog("sys", "Approved. Delivery Team to create Action Plan.");
      idea.status = S.PLAN;
      save(); render(); toast("Approved — over to the Delivery Team.");
      break;
    case "escalate":
      idea.decisions.esl = { outcome: "escalated", feedback: fb, at: nowISO() };
      idea.escalated = true;
      addLog("sys", "Escalated to Project Leader.");
      idea.status = S.PL;
      save(); render(); toast("Escalated to the Project Leader.");
      break;
    case "non-viable":
      idea.decisions[stage] = { outcome: "non-viable", feedback: fb, at: nowISO() };
      addLog("sys", "Marked Non-Viable. Feedback provided for Delivery Team.");
      idea.status = S.FEEDBACK;
      save(); render(); toast("Marked non-viable — feedback sent to the Delivery Team.");
      break;
    case "return": {
      idea.decisions[stage] = { outcome: "returned", feedback: fb, at: nowISO() };
      const to = stage === "pl" ? "ESL Lead" : "Delivery Team";
      addLog("sys", `Returned for detail to the ${to}.`);
      idea.returnStage = stage;
      idea.draft = draftFromSubmission();
      idea.status = S.DRAFT;
      save(); render(); toast(`Returned to the ${to} for more detail.`);
      break;
    }
  }
}

function handleAction(act) {
  const stageKey = idea.status === S.ESL ? "esl" : "pl";
  switch (act) {
    case "back": peek = null; render(); break;
    case "continue-review":
      idea.status = idea.returnStage === "pl" ? S.PL : S.ESL;
      idea.returnStage = null;
      save(); render();
      break;
    case "add-comment": {
      const ta = document.getElementById("newComment");
      const text = ta.value.trim();
      if (!text) { toast("Write a comment first."); return; }
      addLog("comment", text);
      save(); render(); toast("Comment added.");
      break;
    }
    case "submit-decision": {
      const outcomeEl = document.getElementById("decisionOutcome");
      const fbEl = document.getElementById("decisionFeedback");
      const outcome = outcomeEl.value;
      const fb = fbEl.value.trim();
      if (!outcome) { markInvalid(outcomeEl, true); toast("Please choose an outcome."); return; }
      if (outcome !== "approve" && !fb) { markInvalid(fbEl, true); toast("Feedback is required for this outcome."); return; }
      submitDecision(stageKey, outcome, fb);
      break;
    }
    case "mark-complete":
      idea.actionPlan.completedAt = nowISO();
      idea.status = S.POST;
      addLog("sys", "Action Plan marked complete. Post-Implementation Form opened.");
      save(); render(); toast("Marked complete — finish the Post-Implementation Form.");
      break;
    case "ack-feedback":
      idea.status = S.CLOSED;
      addLog("sys", "Feedback received by Delivery Team. Initiative closed.");
      save(); render(); toast("Feedback acknowledged.");
      break;
    case "restart":
      idea = freshIdea();
      peek = null;
      save(); render();
      toast("New idea started.");
      break;
  }
}

/* Clear field-level validation as soon as the user fixes the field */
["input", "change"].forEach(ev => document.addEventListener(ev, e => {
  const f = e.target.closest && e.target.closest(".field");
  if (f) f.classList.remove("invalid");
}));

document.getElementById("resetBtn").onclick = () => {
  idea = freshIdea();
  peek = null;
  save(); render();
  toast("Workflow reset.");
};

/* =============================================================
   Boot
============================================================= */
idea = load() || freshIdea();
render();
</script>
